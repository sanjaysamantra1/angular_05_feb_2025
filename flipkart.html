<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Product Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 800px;
            margin-top: 50px;
        }

        img {
            width: 300px;
            height: auto;
        }

        .product-title {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        .price {
            font-size: 20px;
            color: green;
            font-weight: bold;
        }

        .buttons {
            margin-top: 15px;
        }

        .btn-cart {
            background-color: #FF9900;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 5px;
        }

        .btn-buy {
            background-color: #FF4500;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border-radius: 5px;
        }
    </style>
    <script>
        function addToCart() {
            alert('🛒 Your item has been added to the Amazon cart!');
        }

        function buyNow() {
            alert('✅ Purchase successful! Your order has been placed.');
        }
    </script>
</head>

<body>
    <div class="container text-start" fxFlex="value%" fxFlexAlign="left">
        <img src="https://skybags.co.in/cdn/shop/files/1_75ff29a4-c7d6-4d1f-b250-c99f206d1325_thumbnail.png?v=1692786659"
        alt="Amazon Product" >
            
        <h2 class="product-title">Sky Bag</h2>
        <p class="price">$29.99</p>
        <p>Experience comfort with bag</p>
        
        <div class="buttons">
            <button class="btn-cart" onclick="addToCart()">🛒 Add to Cart</button>
            <button class="btn-buy" onclick="buyNow()">⚡ Buy Now</button>
        </div>
    </div>
</body>

</html>
