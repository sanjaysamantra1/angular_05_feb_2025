
<script>
    function ReverseString(str){
        return str.split("").reverse().join("");
    }
    console.log(ReverseString("sachin"));


    function ReverseSentence(sentence){
        return sentence.split(" ").reverse().join(" ");
    }
    let sentence="This is javascript class";
    console.log(ReverseSentence(sentence));


    function firstNonRepeatedChar(str) {
    for (let char of str) {
        if (str.indexOf(char) === str.lastIndexOf(char)) {
            return char;
        }
    }
    return null;
}

    function MakeFirstLetterUpperCase(str){
        return str.charAt(0).toUpperCase() + str.slice(1);
    }
    
    function MakeFirstLetterLowerCase(str){
        return str.charAt(0).toLowerCase() + str.slice(1);
    }

    function LongestString(str){
        let strArray = str.split(" ");
        let longestWord = "";
        for(let word of strArray){
            if(word.length > longestWord.length){
                longestWord = word;
            }
        }
        return longestWord;
    }

    function ShortestString(str){
        let strArray = str.split(" ");
        let shortestWord = strArray[0];
        for(let word of strArray){
            if(word.length < shortestWord.length){
                shortestWord = word;
            }
        }
        return shortestWord;
    }


    function AccountNumberMasking(accountNumber){
        let maskedAccountNumber =  accountNumber.slice(0,2)+accountNumber.slice(2,-2).replace(/[0-9]/g, "*") + accountNumber.slice(-2);
        return maskedAccountNumber;
    }
    console.log(AccountNumberMasking("1234567890"));


    function creditCardMasking(creditCard){
        let maskedCreditCard = creditCard.slice(0, 4)+"-"+creditCard.slice(4,8)+"-"+creditCard.slice(8,12)+"-"+creditCard.slice(12);
        return maskedCreditCard;
    }
    console.log(creditCardMasking("1111222233334444"));


    function Anagram(str1, str2){
        let sortedStr1 = str1.split("").sort().join("");
        let sortedStr2 = str2.split("").sort().join("");
        return sortedStr1 === sortedStr2;
    }
    console.log(Anagram("listen", "silent"));
</script>
