    function firstNonRepeatedChar(str) {
  for (let char of str) {
    if (str.indexOf(char) === str.lastIndexOf(char)) {
      return char;
    }
  }
  return null;
}
console.log(firstNonRepeatedChar("entertainment"));



function toTitleCase(str) {
    return str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
}


let titlestr = 'this is javascript class';
console.log(toTitleCase(titlestr)); 




function findLongestWord(sentence) {
    let words = sentence.split(' ');
    let longestWord = words.reduce((longest, current) => current.length > longest.length ? current : longest, '');
    return longestWord;
}


let inputString = 'this is javascript class';
console.log(findLongestWord(inputString)); 



function maskAccountNumber(accountNumber) {
    return accountNumber.slice(0, 2) + '*******' + accountNumber.slice(-2);
}
let accountNumber = '12345678987';
console.log(maskAccountNumber(accountNumber));



function formatCreditCard(cardNumber) {
    return cardNumber.match(/.{1,4}/g).join('-');
}
let creditCardNumber = '1111222233334444';
console.log(formatCreditCard(creditCardNumber));  




function isAnagram(str1, str2) {
    let sortedStr1 = str1.split('').sort().join('');
    let sortedStr2 = str2.split('').sort().join('');
    return sortedStr1 === sortedStr2;
}

let str1 = 'listen';
let str2 = 'silent';
console.log(isAnagram(str1, str2) ? 'Anagram' : 'Not an Anagram');

function isPalindrome(str) {
    let reversedStr = str.split('').reverse().join('');
    return str === reversedStr;
}
console.log(isPalindrome('madam') ? 'Palindrome' : 'Not a Palindrome');


function removeSpecialCharacters(str) {
    return str.replace(/[^a-zA-Z0-9]/g, '');
}
let specialStr = 'hello@#hi&';
console.log(removeSpecialCharacters(specialStr));  

function moveSpecialCharacters(str) {
    let letters = str.match(/[a-zA-Z0-9]/g) || [];
    let specials = str.match(/[^a-zA-Z0-9]/g) || [];
    return letters.join('') + specials.join('');
}
let specialStr2 = 'hello@#hi&';
console.log(moveSpecialCharacters(specialStr2));
